name: generate pacman graph

on:
  schedule:
    - cron: "0 */12 * * *"   # runs every 12 hours
  workflow_dispatch:          # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: generate pacman contribution graph
        uses: matchai/pacman-contribution-graph@v3.1.0
        with:
          github_user_name: SnehalDas135
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output_path: dist/pacman-contribution-graph.svg
          theme: classic

      - name: generate dark theme version
        uses: matchai/pacman-contribution-graph@v3.1.0
        with:
          github_user_name: SnehalDas135
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output_path: dist/pacman-contribution-graph-dark.svg
          theme: github-dark

      - name: push to pacman-output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
